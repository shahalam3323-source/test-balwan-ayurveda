<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – Balwaan Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f2f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .header {
            background: #14452F;
            color: #fff;
            padding: 28px 24px;
            text-align: center;
        }
        .header h1 { font-size: 26px; font-weight: 800; }
        .header h1 span { color: #D4AF37; }
        .header p { font-size: 14px; opacity: 0.8; margin-top: 4px; }

        .body { padding: 24px; }

        .variant-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 18px;
        }
        @media (max-width: 420px) { .variant-grid { grid-template-columns: 1fr; } }

        .variant {
            border: 2px solid #e5eaef;
            border-radius: 14px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: #fafcfd;
        }
        .variant:hover { border-color: #D4AF37; }
        .variant.active {
            border-color: #D4AF37;
            background: #fdf7e5;
            box-shadow: 0 0 0 2px #D4AF37;
        }
        .variant h4 { font-size: 14px; font-weight: 700; color: #14452F; }
        .variant .price { font-size: 17px; font-weight: 700; color: #14452F; }
        .variant .badge { font-size: 9px; background: #ff9800; color: #fff; padding: 2px 8px; border-radius: 20px; }

        .bump {
            background: #fffae6;
            border: 2px dashed #D4AF37;
            border-radius: 12px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }
        .bump input { width: 20px; height: 20px; accent-color: #14452F; flex-shrink:0; }
        .bump label { font-size: 13px; font-weight: 600; color: #14452F; cursor: pointer; }
        .bump .extra { font-weight: 700; color: #D4AF37; margin-left: auto; }

        .summary {
            background: #f5f8fc;
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 20px;
        }
        .summary .row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 4px 0;
        }
        .summary .total {
            border-top: 2px solid #D4AF37;
            margin-top: 8px;
            padding-top: 10px;
            font-size: 20px;
            font-weight: 800;
            color: #14452F;
        }

        .form-group { margin-bottom: 14px; }
        .form-group label { font-weight: 600; font-size: 13px; color: #14452F; display: block; margin-bottom: 4px; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5eaef;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #D4AF37;
            outline: none;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: #25D366;
            color: #fff;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:hover { background: #1da851; transform: scale(1.01); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .footnote {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5eaef;
        }
        .footnote i { margin-right: 4px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Balwaan <span>Gold</span></h1>
        <p>Select package &amp; order on WhatsApp</p>
    </div>

    <div class="body">

        <!-- Products -->
        <div class="variant-grid" id="variantGrid">
            <div class="variant active" data-price="550" data-name="Starter Pack">
                <h4>Starter</h4>
                <div class="price">₹550</div>
            </div>
            <div class="variant" data-price="990" data-name="Regular Pack">
                <h4>Regular</h4>
                <div class="price">₹990</div>
            </div>
            <div class="variant" data-price="1599" data-name="Customized">
                <h4>Customized</h4>
                <div class="price">₹1599</div>
                <span class="badge">Popular</span>
            </div>
        </div>

        <!-- E-Book Bump -->
        <div class="bump">
            <input type="checkbox" id="bump">
            <label for="bump">Add <b>Diet E-Book</b> (PDF)</label>
            <span class="extra">+₹99</span>
        </div>

        <!-- Summary -->
        <div class="summary" id="summary">
            <div class="row"><span>Product</span> <span id="sName">Starter Pack</span></div>
            <div class="row"><span>Price</span> <span id="sPrice">₹550</span></div>
            <div class="row" id="bumpRow" style="display:none;"><span>E-Book</span> <span>+₹99</span></div>
            <div class="row total"><span>Total</span> <span id="sTotal">₹550</span></div>
        </div>

        <!-- Form -->
        <form id="orderForm">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fullName" placeholder="e.g. Rajesh Kumar" required>
            </div>
            <div class="form-group">
                <label>WhatsApp Number *</label>
                <input type="tel" id="mobile" placeholder="10-digit number" pattern="[0-9]{10}" maxlength="10" required>
            </div>
            <div class="form-group">
                <label>Delivery Address *</label>
                <textarea id="address" rows="3" placeholder="House, Area, City, Pincode" required></textarea>
            </div>

            <button type="submit" class="btn" id="orderBtn">
                <i class="fab fa-whatsapp fa-lg"></i> Order via WhatsApp
            </button>
        </form>

        <div class="footnote">
            <i class="fas fa-shield-alt"></i> COD Available · Discreet Packaging
        </div>
    </div>
</div>

<script>
    // ----- VARIANT SELECTION -----
    const cards = document.querySelectorAll('.variant');
    const sName = document.getElementById('sName');
    const sPrice = document.getElementById('sPrice');
    const sTotal = document.getElementById('sTotal');
    const bumpRow = document.getElementById('bumpRow');
    const bump = document.getElementById('bump');
    const form = document.getElementById('orderForm');
    const btn = document.getElementById('orderBtn');

    let currentPrice = 550;
    let currentName = 'Starter Pack';

    cards.forEach(c => {
        c.addEventListener('click', function() {
            cards.forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            currentName = this.dataset.name;
            currentPrice = parseInt(this.dataset.price);
            updateSummary();
        });
    });

    bump.addEventListener('change', updateSummary);

    function updateSummary() {
        let total = currentPrice;
        sName.textContent = currentName;
        sPrice.textContent = '₹' + currentPrice;
        if (bump.checked) {
            total += 99;
            bumpRow.style.display = 'flex';
        } else {
            bumpRow.style.display = 'none';
        }
        sTotal.textContent = '₹' + total;
    }

    // ----- FORM SUBMIT -----
    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const name = document.getElementById('fullName').value.trim();
        const mobile = document.getElementById('mobile').value.trim();
        const address = document.getElementById('address').value.trim();

        if (!name || !mobile || !address) {
            alert('Please fill all fields.');
            return;
        }
        if (!/^\d{10}$/.test(mobile)) {
            alert('Enter a valid 10-digit mobile number.');
            return;
        }

        let product = currentName;
        let total = currentPrice;
        if (bump.checked) {
            product += ' + E-Book';
            total += 99;
        }

        const orderId = 'BWG' + Date.now().toString().slice(-6);

        // ----- SAVE TO LOCALSTORAGE (Admin Panel) -----
        let orders = JSON.parse(localStorage.getItem('balwaanOrders') || '[]');
        orders.push({
            orderId, name, mobile, product, amount: total,
            paymentMethod: 'COD', address, timestamp: Date.now()
        });
        localStorage.setItem('balwaanOrders', JSON.stringify(orders));

        // ----- WHATSAPP REDIRECT -----
        const msg = 
`Hi Balwaan Team,%0A%0A*Order ID:* ${orderId}%0A*Name:* ${name}%0A*Mobile:* ${mobile}%0A*Product:* ${product}%0A*Amount:* ₹${total}%0A*Payment:* Cash on Delivery%0A*Address:* ${address}%0A%0APlease confirm my order.`;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Redirecting...';

        window.location.href = `https://wa.me/919557133307?text=${msg}`;

        // Backup: re-enable after 5s if redirect fails
        setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fab fa-whatsapp fa-lg"></i> Order via WhatsApp';
        }, 5000);
    });

    // ----- PRE-FILL from Custom Protocol -----
    const sd = sessionStorage.getItem('checkout_userData');
    if (sd) {
        try {
            const d = JSON.parse(sd);
            if (d.name) document.getElementById('fullName').value = d.name;
            if (d.mobile) document.getElementById('mobile').value = d.mobile;
            sessionStorage.removeItem('checkout_userData');
        } catch(e) {}
    }

    updateSummary();
</script>

</body>
</html>
