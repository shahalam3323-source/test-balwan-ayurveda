<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Exact same styling as before, keeping it clean and inside the file */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f5f7fa; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .checkout-container { max-width: 800px; width: 100%; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #14452F; color: white; padding: 30px; text-align: center; }
        .header h1 { font-family: 'Montserrat', sans-serif; color: #D4AF37; }
        .product-section, .form-section { padding: 30px; }
        h3 { color: #14452F; margin-bottom: 20px; font-family: 'Montserrat', sans-serif;}
        
        .variant-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .variant-card { border: 2px solid #e0e0e0; border-radius: 12px; padding: 15px; cursor: pointer; position: relative; }
        .variant-card.selected { border-color: #D4AF37; background: #faf6e7; }
        .variant-card h4 { color: #14452F; }
        .variant-card .price { font-size: 20px; font-weight: 700; color: #14452F; }
        
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: 'Poppins', sans-serif; }
        .form-group input:focus, .form-group textarea:focus { border-color: #D4AF37; outline: none; }
        
        .payment-option { border: 2px solid #e0e0e0; border-radius: 8px; padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; margin-bottom: 10px;}
        .payment-option.selected { border-color: #D4AF37; background: #faf6e7; }
        
        .order-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #D4AF37, #f5e27a); border: none; border-radius: 50px; font-size: 18px; font-weight: 600; cursor: pointer; color: #14452F;}
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 40px; text-align: center; max-width: 400px;}
        .whatsapp-btn { background: #25D366; color: white; padding: 12px; border-radius: 50px; display: block; text-decoration: none; font-weight: bold; margin-top: 15px;}
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="header">
            <h1>Balwaan Gold</h1>
            <p>Secure Checkout (TEST MODE)</p>
        </div>

        <div class="product-section">
            <h3>Choose Package</h3>
            <div class="variant-options">
                <div class="variant-card" data-price="550" data-value="Starter Pack">
                    <h4>Starter Pack</h4>
                    <div class="price">₹550</div>
                    <div class="saving">15 Days</div>
                </div>
                
                <div class="variant-card selected" data-price="990" data-value="Regular Pack">
                    <h4>Regular Pack</h4>
                    <div class="price">₹990</div>
                    <div class="saving">30 Days</div>
                </div>
                
                <div class="variant-card" data-price="1499" data-value="Combo Pack">
                    <h4>Combo Pack</h4>
                    <div class="price">₹1499</div>
                    <div class="saving">60 Days</div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <form id="checkoutForm">
                <div class="form-group">
                    <input type="text" id="fullName" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="tel" id="mobile" placeholder="Mobile Number" pattern="[0-9]{10}" required>
                </div>
                <div class="form-group">
                    <textarea id="address" rows="3" placeholder="Full Address" required></textarea>
                </div>
                
                <div class="payment-option selected">
                    <input type="radio" name="payment" value="Cash on Delivery" checked>
                    <div><b>Cash on Delivery (COD)</b></div>
                </div>
                <div class="payment-option">
                    <input type="radio" name="payment" value="Prepaid">
                    <div><b>Prepaid (UPI/Card)</b></div>
                </div>

                <button type="submit" class="order-btn">Confirm Order</button>
            </form>
        </div>
    </div>

    <!-- Thank You Modal -->
    <div class="modal" id="thankYouModal">
        <div class="modal-content">
            <i class="fas fa-check-circle" style="font-size: 50px; color: green; margin-bottom: 10px;"></i>
            <h2>Order Placed!</h2>
            <p id="orderNumber" style="font-weight: bold; background: #eee; padding: 10px; margin: 10px 0;">ID: TEST-123</p>
            
            <!-- USING YOUR TEST NUMBER 9808669522 -->
            <a id="whatsappJoinBtn" class="whatsapp-btn" target="_blank">
                <i class="fab fa-whatsapp"></i> Confirm on WhatsApp
            </a>
            <button onclick="window.location.href='/'" style="margin-top: 15px; padding: 10px; border: none; border-radius: 5px; cursor:pointer;">Back to Home</button>
        </div>
    </div>

    <script>
        // TEST GOOGLE FORM (Replace with test form URL later if you want)
        function submitToGoogleForm(orderData){
            console.log("Order Data Saved to Admin Panel:", orderData);
            // DUMMY URL
            const googleFormURL="YOUR_TEST_GOOGLE_FORM_URL";
            // fetch(googleFormURL, { method:"POST", mode:"no-cors", body: new FormData() });
        }

        // DUMMY UPI ID
        const YOUR_UPI_ID = "test-upi@bank";  

        // Package Selection
        const variantCards = document.querySelectorAll('.variant-card');
        variantCards.forEach(card => {
            card.addEventListener('click', function() {
                variantCards.forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // Payment Selection
        const paymentOptions = document.querySelectorAll('.payment-option');
        paymentOptions.forEach(option => {
            option.addEventListener('click', function() {
                paymentOptions.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                this.querySelector('input[type="radio"]').checked = true;
            });
        });

        // Form Submit
        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('fullName').value;
            const mobile = document.getElementById('mobile').value;
            const address = document.getElementById('address').value;
            
            const selectedCard = document.querySelector('.variant-card.selected');
            const productValue = selectedCard.dataset.value;  
            const amount = selectedCard.dataset.price;
            const paymentValue = document.querySelector('input[name="payment"]:checked').value; 

            const orderId = 'TEST-' + Date.now().toString().slice(-6);
            
            // Save to LocalStorage (Admin Panel will read this)
            const orderData = { orderId, name, mobile, address, product: productValue, amount, payment: paymentValue, timestamp: new Date().toISOString() };
            let orders = JSON.parse(localStorage.getItem('balwaanOrders') || '[]');
            orders.push(orderData);
            localStorage.setItem('balwaanOrders', JSON.stringify(orders));

            submitToGoogleForm(orderData);

            // Show Success Modal
            document.getElementById('orderNumber').innerText = 'Order ID: ' + orderId;
            
            // WHATSAPP REDIRECT TO YOUR PERSONAL NUMBER (9808669522)
            const whatsappMsg = `Hi, This is a TEST order.%0AOrder ID: ${orderId}%0AName: ${name}%0APackage: ${productValue}`;
            document.getElementById('whatsappJoinBtn').href = `https://wa.me/919808669522?text=${whatsappMsg}`;
            
            document.getElementById('thankYouModal').classList.add('active');
        });
    </script>
</body>
</html>
